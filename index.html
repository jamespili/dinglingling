<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系统任务</title>
    <style>
        :root { --ios-red: #ff3b30; --ios-green: #34c759; --bg-color: #000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: white; overflow: hidden; }
        
        /* 顶部选项区 - 保持不动 */
        #top-panel { padding: 15px; background: #1c1c1e; border-bottom: 1px solid #333; }
        .mode-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .mode-btn { background: #333; color: #fff; border: 1px solid #555; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
        .mode-btn.active { background: #007aff; border-color: #007aff; }
        #script-body { font-size: 0.85rem; line-height: 1.4; color: #ccc; }
        .highlight { color: #ffbc05; font-weight: bold; }

        /* 主控区 */
        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60%; text-align: center; }
        .rescue-btn { width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg, #ff4b2b, #ff416c); border: none; color: white; font-size: 1.2rem; font-weight: bold; }
        #timer { margin-top: 20px; color: #888; font-family: monospace; }

        /* 通用全屏遮罩 */
        .full-screen { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 100; display: none; flex-direction: column; align-items: center; box-sizing: border-box; }

        /* [界面一] iPhone 来电界面 */
        #call-screen { background: linear-gradient(to bottom, #2c3e50, #000); justify-content: space-between; padding: 80px 0 100px 0; }
        
        /* [界面二] iPhone 通话中界面 (核心重做) */
        #incall-screen { background: #1a1a1a; justify-content: space-between; padding: 60px 0 80px 0; }
        .incall-timer { color: #fff; font-size: 1.1rem; opacity: 0.9; margin-top: 8px; font-variant-numeric: tabular-nums; }
        
        /* iPhone 标志性 3x2 按钮矩阵 */
        .incall-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 0 45px; width: 100%; box-sizing: border-box; margin-top: 20px; }
        .grid-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .icon-circle { 
            width: 72px; height: 72px; border-radius: 50%; 
            background: rgba(255,255,255,0.12); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem; backdrop-filter: blur(10px);
        }
        .grid-item span { font-size: 0.75rem; color: #fff; opacity: 0.9; }

        /* 顶部联系人信息 */
        .caller-info { text-align: center; }
        .caller-info h2 { font-size: 2.2rem; margin: 0; font-weight: 400; letter-spacing: -1px; }
        .caller-info p { color: #ccc; margin-top: 10px; font-size: 1.1rem; }

        /* 底部操作 */
        .call-ui-bottom { width: 100%; display: flex; justify-content: space-around; }
        .btn-circle { width: 78px; height: 78px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; }
        .decline { background: var(--ios-red); }
        .accept { background: var(--ios-green); }
        .hangup { background: var(--ios-red); margin-top: 30px; } /* 挂断按钮 */

        /* 微信/iPhone 辅助文字 */
        .sub-text { font-size: 0.8rem; margin-top: 10px; text-align: center; color: #fff; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="top-panel">
        <div class="mode-selector">
            <button class="mode-btn active" onclick="changeMode('老板', '真不好意思，老总打来的紧急电话，我得回一下。你们先吃！')">职场模式</button>
            <button class="mode-btn" onclick="changeMode('家里老头子', '哎呀，家里打来的，估计有急事，我得回个电话看看，抱歉！')">家庭模式</button>
            <button class="mode-btn" onclick="changeMode('158-9921-0428', '不好意思，我车好像挡着人家了，我赶紧去处理下，回见！')">挪车/快递</button>
            <button class="mode-btn" onclick="changeMode('【 紧急呼叫 】', '抱歉，有个预约电话等一天了，我得接一下。')">抽象模式</button>
        </div>
        <div id="script-body">
            <div>❶ <span class="highlight">皱眉叹气</span> ❷ <span class="highlight">无辜眼神</span> ❸ <span class="highlight">台词撤离</span></div>
            <div id="current-script" style="margin-top:5px; color:#fff;">“真不好意思，老总打来的紧急电话，我得回一下。你们先吃！”</div>
        </div>
    </div>

    <div id="setup-screen">
        <button id="start-btn" class="rescue-btn" onclick="startCountdown()">救 我</button>
        <div id="timer">T-MINUS 60s</div>
    </div>

    <div id="call-screen" class="full-screen">
        <div class="caller-info">
            <h2 class="dynamic-name">老板</h2>
            <p>移动电话</p>
        </div>
        <div class="call-ui-bottom">
            <div>
                <div class="btn-circle decline" onclick="reset()">✕</div>
                <div class="sub-text">拒绝</div>
            </div>
            <div>
                <div class="btn-circle accept" onclick="pickUp()">✓</div>
                <div class="sub-text">接听</div>
            </div>
        </div>
    </div>

    <div id="incall-screen" class="full-screen">
        <div class="caller-info">
            <h2 class="dynamic-name" style="font-size: 1.8rem;">老板</h2>
            <div class="incall-timer" id="call-duration">00:01</div>
        </div>
        
        <div class="incall-grid">
            <div class="grid-item"><div class="icon-circle">🔇</div><span>静音</span></div>
            <div class="grid-item"><div class="icon-circle">⌨️</div><span>键盘</span></div>
            <div class="grid-item"><div class="icon-circle">🔊</div><span>免提</span></div>
            <div class="grid-item"><div class="icon-circle">➕</div><span>添加通话</span></div>
            <div class="grid-item"><div class="icon-circle">🎞️</div><span>FaceTime</span></div>
            <div class="grid-item"><div class="icon-circle">👤</div><span>通讯录</span></div>
        </div>

        <div onclick="reset()">
            <div class="btn-circle hangup">✕</div>
        </div>
    </div>

    <audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
    <audio id="hello-voice" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        let durationTimer;
        const ringtone = document.getElementById('ringtone');
        const helloVoice = document.getElementById('hello-voice');
        const callScreen = document.getElementById('call-screen');
        const incallScreen = document.getElementById('incall-screen');
        const timerText = document.getElementById('timer');
        const currentScript = document.getElementById('current-script');

        // 解锁音频权限
        document.body.addEventListener('click', () => {
            ringtone.load();
            helloVoice.load();
        }, { once: true });

        function changeMode(name, script) {
            document.querySelectorAll('.dynamic-name').forEach(el => el.innerText = name);
            currentScript.innerText = `“${script}”`;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(name.substring(0,2)) || (name.includes('-') && btn.innerText.includes('挪车'))) btn.classList.add('active');
            });
        }

        function startCountdown() {
            let timeLeft = 60;
            document.getElementById('start-btn').disabled = true;
            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = `准备中：${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    triggerCall();
                }
            }, 1000);
        }

        function triggerCall() {
            ringtone.play().catch(() => {});
            callScreen.style.display = 'flex';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        function pickUp() {
            ringtone.pause();
            callScreen.style.display = 'none';
            incallScreen.style.display = 'flex'; 
            
            // 播放灵魂“喂”
            setTimeout(() => { helloVoice.play().catch(() => {}); }, 700);

            // 开启 iPhone 风格计时器
            let sec = 0;
            durationTimer = setInterval(() => {
                sec++;
                let m = Math.floor(sec/60).toString().padStart(2, '0');
                let s = (sec%60).toString().padStart(2, '0');
                document.getElementById('call-duration').innerText = `${m}:${s}`;
            }, 1000);

            // 10秒后自动彻底隐藏（模拟你已经挂电话放兜里了）
            setTimeout(() => { reset(); }, 10000);
        }

        function reset() {
            clearInterval(durationTimer);
            ringtone.pause();
            helloVoice.pause();
            callScreen.style.display = 'none';
            incallScreen.style.display = 'none';
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            timerText.innerText = "已就绪";
            document.getElementById('start-btn').disabled = false;
        }
    </script>
</body>
</html>
